    <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋哇嗚 7/25~7/31</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        earth: {
                            50: '#FAF9F7',  /* 極淺米白 - 背景 */
                            100: '#F0EBE1', /* 奶油色 - 卡片頂部/標籤 */
                            200: '#E2DAC8', /* 淺卡其 - 邊線 */
                            300: '#C7BCA3', /* 卡其 - 裝飾線 */
                            400: '#AFA184', /* 淺棕 - 圓點/次要圖標 */
                            500: '#948567',
                            600: '#75684D', /* 棕色 - 次要文字 */
                            700: '#5C513D',
                            800: '#433A2B', /* 深棕色 - 主要文字 */
                            900: '#2E271D',
                        },
                        sage: {
                            600: '#687059', /* 墨綠色 - 標題重點色 */
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #FAF9F7;
            color: #433A2B;
        }

        /* 隱藏原生滾動條以維持極簡感 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2DAC8;
            border-radius: 10px;
        }

        /* 手風琴折疊動畫 - 利用 Grid Transition 達成平滑效果 */
        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s ease-out, opacity 0.3s ease-out;
            opacity: 0.3;
        }
        .accordion-content.is-open {
            grid-template-rows: 1fr;
            opacity: 1;
        }
        .accordion-inner {
            overflow: hidden;
        }

        /* 純 CSS 箭頭旋轉動畫 (不使用圖片) */
        .chevron {
            transition: transform 0.4s ease, top 0.4s ease;
        }
        .is-open .chevron {
            transform: rotate(225deg);
            top: 2px;
        }
    </style>
</head>
<body class="antialiased min-h-screen py-10 px-5 md:px-8">
    
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <div class="inline-block border-b-2 border-sage-600/40 pb-3 mb-4">
                <h1 class="text-3xl md:text-4xl font-semibold tracking-[0.1em] text-earth-800">名古屋哇嗚</h1>
            </div>
            <p class="text-earth-600 text-sm md:text-base tracking-[0.2em] uppercase">July 25 - July 31 Trip Itinerary</p>
        </header>

        <!-- 行程卡片容器 -->
        <div id="itinerary-container" class="space-y-5">
            <!-- 內容將由 JavaScript 動態生成 -->
        </div>

        <!-- 總結面板容器 (已移至最下方) -->
        <div id="summary-container" class="mt-5 mb-10">
            <!-- 內容將由 JavaScript 動態生成 -->
        </div>
        
        <footer class="mt-16 text-center text-earth-400 text-xs tracking-widest">
            MINIMALIST JOURNEY RECORD
        </footer>
    </div>

    <script>
        const itineraryData = [
            {
                date: "7/25 (六)",
                title: "久屋大通",
                steps: "12,000",
                transport: "1,500",
                food: "7,500",
                morning: ["IT206 (0900TPE~1255NGO)", "機場矢場丼 🍽️", "久屋大通西鐵", "HARBS甜點 🍽️"],
                afternoon: ["久屋大通公園", "中部電力塔", "中日大樓 (藍瓶、HOKA、mont-bell、觀景台)", "綠洲21"],
                evening: ["JAZZ&COFFEE YURI 🍽️"]
            },
            {
                date: "7/26 (日)",
                title: "犬山",
                note: "久屋大通車站買週末環保票 (來回名古屋車站用)",
                steps: "18,000",
                transport: "2,000",
                food: "10,000",
                morning: ["7:30飯店早餐 🍽️", "三光稻荷神社", "針綱神社", "犬山城"],
                afternoon: ["犬山城下町", "Unakyu鰻魚飯 🍽️", "大名古屋百貨B1 (弁才天)水果大福 🍽️", "飯店休息 (至16:20)"],
                evening: ["麵家獅子丸 (百名店) 🍽️", "JR GATE TOWER (UQ、GU、Bic Camera、15樓星巴克夜景 🍽️)", "7-11 (買隔天早餐)"]
            },
            {
                date: "7/27 (一)",
                title: "伊勢",
                note: "買伊勢一日卷",
                steps: "20,000",
                transport: "7,000",
                food: "9,000",
                morning: ["8:30出門", "9:10近鐵特急到伊勢車站", "宇治橋", "五十鈴川", "伊勢神宮"],
                afternoon: ["御蔭橫丁 (赤福 🍽️)", "伊勢うどん奥野家 🍽️", "二見興玉神社", "夫婦岩"],
                evening: ["燒肉的和民 🍽️"]
            },
            {
                date: "7/28 (二)",
                title: "大須熱田",
                note: "久屋大通買地下鐵1日卷",
                steps: "16,000",
                transport: "860",
                food: "6,000",
                morning: ["9:20出發", "大須招財貓", "Konparu咖啡 🍽️", "大須萬松寺", "大須商店街", "大須觀音", "三輪神社"],
                afternoon: ["熱田神宮", "μPLAT 神宮前 (百元店、宮きしめん 🍽️、TULLYS 🍽️)", "東別院"],
                evening: ["東別院市集", "超商買早餐 🍽️"]
            },
            {
                date: "7/29 (三)",
                title: "京都",
                steps: "25,000",
                transport: "11,000",
                food: "7,500",
                morning: ["6:50出門", "7:35名古屋新幹線到京都", "清水寺", "產寧坂、二年坂", "星巴克/日東堂 🍽️", "法觀寺", "八阪更申堂"],
                afternoon: ["八坂神社", "錦拉麵 🍽️", "伏見稻荷大社"],
                evening: ["京都Porta (無印良品、3coins)", "伊勢丹百貨 (和幸豬排) 🍽️", "八條口新幹線"]
            },
            {
                date: "7/30 (四)",
                title: "",
                note: "久屋大通買地下鐵一日卷",
                steps: "15,000",
                transport: "860",
                food: "6,500",
                morning: ["加藤珈琲店 🍽️", "Work Man+"],
                afternoon: ["名古屋城", "鳥開總本家 🍽️", "榮站 (SKYLE：鬼塚虎、3COINS+plus、UQ、ABC、大創)"],
                evening: ["唐吉訶德 榮本店", "晚餐：炭火焼鳥しげ 🍽️ / 朝ノしぐれ 🍽️"]
            },
            {
                date: "7/31 (五)",
                title: "",
                steps: "6,000",
                transport: "1,200",
                food: "3,500",
                morning: ["6:50出門", "7:00客美多早餐 🍽️", "9:00前退房", "中部國際機場T2", "報到後午餐 🍽️"],
                afternoon: ["IT779 (1345NGO~1605RMQ)"],
                evening: []
            }
        ];

        const container = document.getElementById('itinerary-container');
        const summaryContainer = document.getElementById('summary-container');

        // --- 計算總計與明細邏輯 ---
        let totalTransport = 0;
        let totalFood = 0;
        let breakdownHTML = '';

        itineraryData.forEach(day => {
            let tCost = 0;
            let fCost = 0;
            
            // 轉換字串為數字並累加
            if (day.transport) tCost = parseInt(day.transport.replace(/,/g, ''));
            if (day.food) fCost = parseInt(day.food.replace(/,/g, ''));
            
            totalTransport += tCost;
            totalFood += fCost;

            // 生成每日明細的 HTML 行
            breakdownHTML += `
                <div class="grid grid-cols-3 text-[13px] md:text-sm py-3 border-b border-earth-100/60 last:border-0 text-earth-700 hover:bg-earth-50/50 transition-colors">
                    <div class="font-medium pl-3">${day.date}</div>
                    <div class="text-center font-mono">¥${tCost.toLocaleString()}</div>
                    <div class="text-right font-mono pr-3">¥${fCost.toLocaleString()}</div>
                </div>
            `;
        });

        const totalCost = totalTransport + totalFood;
        const formattedTransport = totalTransport.toLocaleString();
        const formattedFood = totalFood.toLocaleString();
        const formattedTotal = totalCost.toLocaleString();

        const summaryHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-earth-100 overflow-hidden accordion-item transition-all duration-300 hover:shadow-md">
                <!-- 總表標題按鈕 (手風琴) -->
                <button class="w-full px-6 py-5 flex items-center justify-between bg-white hover:bg-earth-50/50 transition-colors duration-300 accordion-btn outline-none">
                    <div class="flex flex-col items-start gap-2 text-left">
                        <div class="flex items-center gap-4">
                            <span class="w-1.5 h-5 bg-[#8C6D46] rounded-full inline-block"></span>
                            <span class="text-lg md:text-xl font-semibold text-earth-800 tracking-wide">預算總表與明細</span>
                            <span class="text-[#8C6D46] bg-[#F6F1EA] px-3 py-1 rounded-full text-xs md:text-sm font-medium tracking-wider">Budget Breakdown</span>
                        </div>
                    </div>
                    <!-- 純 CSS 繪製的箭頭 -->
                    <div class="w-2.5 h-2.5 border-r-2 border-b-2 border-earth-400 transform rotate-45 relative top-[-2px] chevron shrink-0 ml-4"></div>
                </button>
                
                <!-- 卡片折疊內容 (預設關閉) -->
                <div class="accordion-content">
                    <div class="accordion-inner">
                        <div class="p-6 md:p-8 border-t border-earth-50">

                            <!-- 每日明細清單 -->
                            <div class="mb-8">
                                <h3 class="text-sm font-bold text-earth-600 tracking-widest border-b border-earth-200 pb-2 mb-4 inline-block uppercase">
                                    每日預算明細
                                </h3>
                                <div class="bg-white border border-earth-100 rounded-xl overflow-hidden shadow-sm">
                                    <!-- 表頭 -->
                                    <div class="grid grid-cols-3 text-xs font-bold text-earth-500 bg-[#F6F5F2] py-2.5 px-3 border-b border-earth-200 tracking-widest">
                                        <div>日期</div>
                                        <div class="text-center">車資估計</div>
                                        <div class="text-right">餐費估計</div>
                                    </div>
                                    <!-- 明細列表 -->
                                    <div>
                                        ${breakdownHTML}
                                    </div>
                                </div>
                            </div>

                            <!-- 花費統計區塊 -->
                            <h3 class="text-sm font-bold text-earth-600 tracking-widest border-b border-earth-200 pb-2 mb-4 inline-block uppercase">
                                預算總計
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="bg-[#F6F5F2] p-4 rounded-xl border border-earth-100 flex flex-col justify-center items-center text-center">
                                    <span class="text-earth-500 text-xs font-bold tracking-widest mb-1">總車資</span>
                                    <span class="text-2xl font-bold text-earth-800 font-mono">¥${formattedTransport}</span>
                                </div>
                                <div class="bg-[#F6F5F2] p-4 rounded-xl border border-earth-100 flex flex-col justify-center items-center text-center">
                                    <span class="text-earth-500 text-xs font-bold tracking-widest mb-1">總餐費</span>
                                    <span class="text-2xl font-bold text-earth-800 font-mono">¥${formattedFood}</span>
                                </div>
                                <div class="bg-[#E2DAC8]/30 p-4 rounded-xl border border-[#C7BCA3] flex flex-col justify-center items-center text-center">
                                    <span class="text-earth-700 text-xs font-bold tracking-widest mb-1">基本花費總計</span>
                                    <span class="text-3xl font-bold text-sage-600 font-mono">¥${formattedTotal}</span>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            </div>
        `;

        summaryContainer.innerHTML = summaryHTML;
        // --- 新增結束 ---

        itineraryData.forEach((day, index) => {
            let timeBlocksHTML = '';
            
            const periods = [
                { key: 'morning', label: '早上' },
                { key: 'afternoon', label: '下午' },
                { key: 'evening', label: '晚上' }
            ];
            
            // 處理早/中/晚區塊
            periods.forEach(period => {
                if (day[period.key] && day[period.key].length > 0) {
                    let listItems = day[period.key].map(text => {
                        const isFood = text.includes('🍽️');
                        
                        // 餐點特化樣式：奶茶色背景、深色字、圓角
                        const content = isFood 
                            ? `<span class="bg-[#EADDCA] text-[#553C22] font-medium px-2 py-1 rounded-md shadow-sm inline-block">${text}</span>`
                            : `<span class="text-earth-800">${text}</span>`;
                        
                        // 純 CSS 圓點取代傳統列表樣式
                        return `
                            <li class="flex items-start mb-3 last:mb-0 group">
                                <span class="mt-2.5 mr-3 block w-[5px] h-[5px] rounded-full ${isFood ? 'bg-[#A98A69]' : 'bg-earth-300 group-hover:bg-earth-400'} transition-colors shrink-0"></span>
                                <div class="leading-relaxed text-[15px]">
                                    ${content}
                                </div>
                            </li>
                        `;
                    }).join('');

                    timeBlocksHTML += `
                        <div class="mb-6 md:mb-0">
                            <h3 class="text-sm font-bold text-sage-600 tracking-widest border-b border-sage-600/20 pb-2 mb-4 inline-block uppercase">
                                ${period.label}
                            </h3>
                            <ul class="space-y-1">
                                ${listItems}
                            </ul>
                        </div>
                    `;
                }
            });

            // 預設展開第一天
            const isFirst = index === 0;
            const accordionState = isFirst ? 'is-open' : '';
            
            const cardHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-earth-100 overflow-hidden accordion-item transition-all duration-300 hover:shadow-md">
                    <!-- 卡片標題按鈕 -->
                    <button class="w-full px-6 py-5 flex items-center justify-between bg-white hover:bg-earth-50/50 transition-colors duration-300 accordion-btn outline-none">
                        <div class="flex flex-col items-start gap-2 text-left">
                            <div class="flex items-center gap-4">
                                <span class="text-lg md:text-xl font-semibold text-earth-800 tracking-wide">${day.date}</span>
                                ${day.title ? `<span class="text-earth-700 bg-earth-100 px-3 py-1 rounded-full text-xs md:text-sm font-medium tracking-wider">${day.title}</span>` : ''}
                            </div>
                            
                            <!-- 買票備註提醒 -->
                            ${day.note ? `
                            <div class="inline-flex items-center gap-1.5 text-xs md:text-sm font-semibold text-[#8C6D46] bg-[#F6F1EA] px-2.5 py-1 rounded border border-[#E6D9C8] mt-1 shadow-sm">
                                <span class="animate-pulse w-1.5 h-1.5 rounded-full bg-[#D4A373]"></span>
                                註：${day.note}
                            </div>
                            ` : ''}
                        </div>
                        
                        <!-- 純 CSS 繪製的箭頭 -->
                        <div class="w-2.5 h-2.5 border-r-2 border-b-2 border-earth-400 transform rotate-45 relative top-[-2px] chevron shrink-0 ml-4"></div>
                    </button>
                    
                    <!-- 卡片折疊內容 -->
                    <div class="accordion-content ${accordionState}">
                        <div class="accordion-inner">
                            <div class="p-6 pt-2 border-t border-earth-50">
                                
                                <!-- 追蹤欄位 (步數、車資、餐費) - 無圖標純文字排版 -->
                                <div class="flex flex-wrap gap-4 mb-8 bg-[#F6F5F2] px-5 py-4 rounded-xl border border-[#EBE7DF] relative mt-3">
                                    <div class="absolute -top-2.5 left-5 bg-earth-400 text-white text-[10px] font-bold px-2.5 py-0.5 rounded tracking-widest uppercase shadow-sm">
                                        Day Tracker
                                    </div>
                                    <div class="flex-1 min-w-[120px] mt-1">
                                        <div class="text-xs text-earth-500 mb-1.5 font-medium tracking-wide">預估步數</div>
                                        <div class="font-medium text-earth-800 border-b border-earth-300 border-dashed pb-1">${day.steps} 步</div>
                                    </div>
                                    <div class="flex-1 min-w-[120px] mt-1">
                                        <div class="text-xs text-earth-500 mb-1.5 font-medium tracking-wide">車資花費</div>
                                        <div class="font-medium text-earth-800 border-b border-earth-300 border-dashed pb-1">¥${day.transport}</div>
                                    </div>
                                    <div class="flex-1 min-w-[120px] mt-1">
                                        <div class="text-xs text-earth-500 mb-1.5 font-medium tracking-wide">餐費花費</div>
                                        <div class="font-medium text-earth-800 border-b border-earth-300 border-dashed pb-1">¥${day.food}</div>
                                    </div>
                                </div>

                                <!-- 早中晚區塊排版 (電腦版為三排，手機版自動往下推) -->
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-x-10 gap-y-8">
                                    ${timeBlocksHTML}
                                </div>
                                
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', cardHTML);
        });

        // 手風琴點擊交互邏輯
        document.querySelectorAll('.accordion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const content = btn.nextElementSibling;
                
                // 開關當前的折疊面板
                content.classList.toggle('is-open');
                
                // 若想要手風琴「一次只展開一個」，可以解除下方註解
                /*
                document.querySelectorAll('.accordion-content').forEach(c => {
                    if (c !== content) {
                        c.classList.remove('is-open');
                    }
                });
                */
            });
        });
    </script>
</body>
</html>
